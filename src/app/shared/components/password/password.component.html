<div class="form-field">
  <label *ngIf="label" class="form-label">
    {{ label }}
    <span *ngIf="isRequired" class="required">*</span>
  </label>

  <p-password
    [formControl]="control"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [toggleMask]="toggleMask"
    [feedback]="feedback"
    [attr.maxlength]="maxlength || null"
    styleClass="w-full"
  >
  </p-password>

  <app-validation-messages [control]="control" [label]="label">
  </app-validation-messages>
</div>
